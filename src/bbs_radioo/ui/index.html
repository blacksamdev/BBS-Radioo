<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BBS radiOO</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0a0a0a;
  --bg-2:     #111111;
  --bg-3:     #191919;
  --bg-4:     #242424;
  --border:   rgba(255,255,255,0.07);
  --border-h: rgba(255,255,255,0.13);
  --t1: #ebebeb;
  --t2: #888;
  --t3: #4a4a4a;
  --accent: #e11d2e;
  --accent-d: rgba(225,29,46,0.12);
  --accent-h: #ff3344;
  --gold: #f0b030;
  --green: #22c55e;
  --font: 'Syne', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

html, body { height: 100%; background: var(--bg); color: var(--t1); font-family: var(--font); font-size: 14px; overflow: hidden; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-4); border-radius: 2px; }
.app { display: flex; height: 100vh; }

/* ═══ SIDEBAR ═══ */
.sidebar {
  width: 200px; min-width: 200px; background: var(--bg-2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow-y: auto; overflow-x: hidden; padding-bottom: 16px;
}
.sidebar-logo {
  padding: 16px 14px 13px;
  display: flex; align-items: center; gap: 11px;
  border-bottom: 1px solid var(--border); margin-bottom: 8px;
}
.logo-svg { width: 38px; height: 38px; flex-shrink: 0; }
.logo-text { font-size: 15px; font-weight: 800; letter-spacing: 0.3px; color: var(--t1); line-height: 1; }
.logo-text em { font-style: normal; color: var(--accent); }

.nav-section { padding: 0 10px 4px; }
.nav-label {
  font-size: 9.5px; font-weight: 700; color: var(--t3);
  letter-spacing: 1.6px; text-transform: uppercase; padding: 12px 6px 5px;
}
.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 9px; border-radius: 7px; cursor: pointer;
  color: var(--t2); font-size: 13px; font-weight: 500;
  transition: background 0.12s, color 0.12s; user-select: none;
}
.nav-item:hover { background: var(--bg-3); color: var(--t1); }
.nav-item.active { background: var(--accent-d); color: var(--accent); }
.nav-item.adfree:hover { color: var(--green); }
.nav-item.adfree.active { background: rgba(34,197,94,0.1); color: var(--green); }
.nav-icon { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.6; }
.nav-item.active .nav-icon, .nav-item.adfree.active .nav-icon { opacity: 1; }
.nav-badge {
  margin-left: auto; background: var(--bg-4); color: var(--t2);
  font-family: var(--mono); font-size: 9.5px; padding: 2px 6px; border-radius: 20px;
}
.nav-item.active .nav-badge { background: var(--accent); color: #fff; }
.nav-item.adfree.active .nav-badge { background: var(--green); color: #000; }

/* ═══ MAIN ═══ */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.main-header {
  padding: 18px 22px 14px;
  display: flex; align-items: center; gap: 14px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.main-title { font-size: 19px; font-weight: 800; color: var(--t1); }
.main-count { font-size: 11px; color: var(--t3); font-family: var(--mono); margin-top: 2px; }
.search-wrap {
  margin-left: auto; display: flex; align-items: center;
  background: var(--bg-3); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 11px; gap: 7px; transition: border-color 0.15s;
}
.search-wrap:focus-within { border-color: var(--accent); }
.search-wrap svg { color: var(--t3); flex-shrink: 0; }
.search-wrap input {
  background: none; border: none; outline: none;
  color: var(--t1); font-family: var(--font); font-size: 13px; width: 170px;
}
.search-wrap input::placeholder { color: var(--t3); }
.main-content { flex: 1; overflow-y: auto; padding: 16px 22px 28px; }

/* Station grid */
.station-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(248px, 1fr)); gap: 9px; }
.station-card {
  display: flex; align-items: center; gap: 11px;
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: 10px; padding: 11px 13px; cursor: pointer;
  transition: background 0.15s, border-color 0.15s, transform 0.15s;
  position: relative; overflow: hidden;
}
.station-card:hover { background: var(--bg-3); border-color: var(--border-h); transform: translateY(-1px); }
.station-card.playing { border-color: var(--accent); background: var(--accent-d); }
.station-card.playing::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); }
.station-logo { width: 50px; height: 50px; border-radius: 8px; flex-shrink: 0; overflow: hidden; position: relative; }
.station-logo img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; z-index: 1; }
.station-logo .logo-gen { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 800; color: rgba(255,255,255,0.88); letter-spacing: -0.5px; }
.station-info { flex: 1; min-width: 0; }
.station-name { font-size: 13px; font-weight: 700; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
.station-desc { font-size: 11px; color: var(--t2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.station-country { font-size: 10.5px; color: var(--t3); font-family: var(--mono); margin-top: 3px; display: block; }
.play-btn {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--bg-4); border: 1px solid var(--border);
  color: var(--t2); cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.play-btn:hover, .station-card.playing .play-btn { background: var(--accent); border-color: var(--accent); color: #fff; }

.loading-state, .empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 320px; color: var(--t3); gap: 12px; text-align: center;
}
.spinner { width: 26px; height: 26px; border: 2px solid var(--bg-4); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.65s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-icon { font-size: 34px; opacity: 0.35; margin-bottom: 4px; }
.empty-head { font-size: 13.5px; font-weight: 600; color: var(--t2); }
.empty-sub { font-size: 11.5px; }
.status-bar {
  padding: 5px 22px; background: var(--bg-2); border-top: 1px solid var(--border);
  font-size: 11px; color: var(--t3); font-family: var(--mono);
  flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ═══ PLAYER ═══ */
.player { width: 258px; min-width: 258px; background: var(--bg-2); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }

.artwork { position: relative; height: 205px; flex-shrink: 0; overflow: hidden; background: #0d0d0d; display: flex; align-items: center; justify-content: center; }
.artwork-blur { position: absolute; inset: -30px; background-size: cover; background-position: center; filter: blur(28px) brightness(0.55) saturate(2.2); opacity: 0; transition: opacity 0.7s; pointer-events: none; }
.artwork-blur.on { opacity: 1; }
.artwork-vignette { position: absolute; inset: 0; z-index: 1; background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.55) 100%); pointer-events: none; }
.artwork-idle { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 10px; opacity: 0.22; }
.artwork-idle span { font-size: 10px; font-family: var(--mono); }
.artwork-real { position: relative; z-index: 2; width: 106px; height: 106px; border-radius: 14px; overflow: hidden; display: none; align-items: center; justify-content: center; box-shadow: 0 20px 56px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.06); }
.artwork-real img { width: 100%; height: 100%; object-fit: cover; display: block; }
.artwork-gen { position: relative; z-index: 2; width: 106px; height: 106px; border-radius: 14px; display: none; align-items: center; justify-content: center; flex-direction: column; overflow: hidden; box-shadow: 0 20px 56px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.08); }
.artwork-gen-initials { font-size: 36px; font-weight: 800; color: rgba(255,255,255,0.92); letter-spacing: -2px; line-height: 1; text-shadow: 0 2px 12px rgba(0,0,0,0.5); position: relative; z-index: 1; }
.artwork-gen-deco { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }

/* Info panel */
.player-info { padding: 11px 15px 6px; flex-shrink: 0; }
.player-name { font-size: 13.5px; font-weight: 700; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
.player-name.idle { font-size: 12px; color: var(--t3); font-weight: 400; }

.player-badges { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; margin-bottom: 5px; }
.badge { font-size: 9.5px; font-family: var(--mono); font-weight: 500; padding: 2px 6px; border-radius: 4px; letter-spacing: 0.3px; white-space: nowrap; }
.badge-bitrate { background: rgba(225,29,46,0.15); color: #ff6070; }
.badge-codec   { background: rgba(255,255,255,0.07); color: var(--t2); }
.badge-source  { background: rgba(255,255,255,0.05); color: var(--t3); }
.badge-country { background: rgba(255,255,255,0.05); color: var(--t3); }
.badge-adfree  { background: rgba(34,197,94,0.15); color: var(--green); }

.player-description {
  font-size: 11px; color: var(--t2); line-height: 1.5; margin-bottom: 5px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.player-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 5px; }
.player-tag { font-size: 9px; font-family: var(--mono); padding: 2px 5px; border-radius: 3px; background: var(--bg-4); color: var(--t3); border: 1px solid var(--border); }

.player-homepage {
  display: none; align-items: center; gap: 5px;
  font-size: 10.5px; color: var(--t3); font-family: var(--mono);
  cursor: pointer; background: none; border: none; padding: 0; margin-bottom: 6px;
  transition: color 0.15s;
}
.player-homepage:hover { color: var(--accent); }

/* Now playing — artiste + titre séparés */
.player-now-playing { display: none; flex-direction: column; gap: 1px; margin-top: 4px; }
.player-now-playing.visible { display: flex; }
.player-artist {
  font-size: 11px; color: var(--t2); font-family: var(--mono);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.player-track {
  font-size: 12px; font-weight: 600; color: var(--accent);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
/* Fallback quand pas de séparation artiste/titre */
.player-track-only {
  display: none; font-size: 11.5px; color: var(--accent); font-family: var(--mono);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 4px;
}

.bars { display: none; align-items: flex-end; gap: 2.5px; height: 12px; margin-top: 5px; }
.bars.on { display: flex; }
.bar { width: 3px; background: var(--accent); border-radius: 2px; animation: bounce 0.9s ease-in-out infinite; }
.bar:nth-child(1) { height: 8px;  animation-delay: 0s;    }
.bar:nth-child(2) { height: 12px; animation-delay: 0.18s; }
.bar:nth-child(3) { height: 6px;  animation-delay: 0.36s; }
.bar:nth-child(4) { height: 10px; animation-delay: 0.09s; }
@keyframes bounce { 0%,100% { transform: scaleY(0.35); } 50% { transform: scaleY(1); } }

.controls { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 4px 15px 10px; flex-shrink: 0; }
.ctrl { border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; background: var(--bg-3); color: var(--t2); border-radius: 50%; }
.ctrl:hover { border-color: var(--border-h); color: var(--t1); }
.ctrl.sm { width: 38px; height: 38px; }
.ctrl.lg { width: 52px; height: 52px; background: var(--accent); border-color: var(--accent); color: #fff; }
.ctrl.lg:hover { background: var(--accent-h); border-color: var(--accent-h); }
.ctrl.gold { color: var(--gold); border-color: rgba(240,176,48,0.35); }

.vol-row { display: flex; align-items: center; gap: 8px; padding: 0 15px 10px; flex-shrink: 0; }
.vol-icon { color: var(--t3); flex-shrink: 0; }
.vol-slider { flex: 1; -webkit-appearance: none; height: 3px; border-radius: 2px; background: linear-gradient(to right, var(--accent) var(--v, 100%), var(--bg-4) var(--v, 100%)); outline: none; }
.vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--t1); border-radius: 50%; cursor: pointer; transition: background 0.15s; }
.vol-slider::-webkit-slider-thumb:hover { background: var(--accent); }
.vol-pct { font-size: 10.5px; color: var(--t3); font-family: var(--mono); min-width: 32px; text-align: right; }

.divider { height: 1px; background: var(--border); margin: 0 15px; flex-shrink: 0; }

.recent-panel { flex: 1; overflow-y: auto; padding: 10px 15px; display: none; }
.recent-label { font-size: 9.5px; font-weight: 700; color: var(--t3); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
.track-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); }
.track-item:last-child { border: none; }
.track-num { font-size: 10px; color: var(--t3); font-family: var(--mono); width: 14px; flex-shrink: 0; }
.track-info { flex: 1; min-width: 0; }
.track-artist { font-size: 10px; color: var(--t3); font-family: var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-title { font-size: 12px; font-weight: 500; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-time { font-size: 10px; color: var(--t3); font-family: var(--mono); flex-shrink: 0; }
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR — sans genres -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <svg class="logo-svg" viewBox="0 0 38 38" xmlns="http://www.w3.org/2000/svg">
        <rect width="38" height="38" rx="9" fill="#1c2026"/>
        <circle cx="19" cy="21" r="14" fill="none" stroke="#c8d0d8" stroke-width="0.9" opacity="0.35"/>
        <circle cx="19" cy="21" r="9"  fill="none" stroke="#c8d0d8" stroke-width="1"   opacity="0.6"/>
        <circle cx="19" cy="21" r="4.5" fill="none" stroke="#c8d0d8" stroke-width="1.2" opacity="0.9"/>
        <line x1="19" y1="21" x2="30" y2="9" stroke="#e11d2e" stroke-width="2" stroke-linecap="round"/>
        <circle cx="29.5" cy="9.5" r="2.2" fill="#e8e8e8"/>
        <circle cx="29.5" cy="9.5" r="1"   fill="#e11d2e"/>
        <circle cx="19" cy="21" r="2.5" fill="#e11d2e"/>
        <circle cx="19" cy="21" r="1"   fill="#1c2026"/>
      </svg>
      <span class="logo-text">BBS radi<em>OO</em></span>
    </div>

    <div class="nav-section">
      <div class="nav-label">Sélections</div>
      <div class="nav-item active" onclick="setSection(this,'En ce moment','trending')">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><polyline points="1,11 4.5,7 7,9.5 10,5.5 15,8"/></svg>
        En ce moment
      </div>
      <div class="nav-item" onclick="setSection(this,'Top stations','popular')">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1.5l1.84 3.73 4.12.6-2.98 2.9.7 4.1L8 10.77 4.32 12.83l.7-4.1L2.04 5.83l4.12-.6z"/></svg>
        Top stations
      </div>
      <div class="nav-item adfree" onclick="setSection(this,'Sans pub','adfree')">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1L2 4v4c0 3.5 2.5 6.5 6 7.5C12 14.5 14 11.5 14 8V4L8 1z"/></svg>
        Sans pub
      </div>
    </div>

    <div class="nav-section">
      <div class="nav-label">Bibliothèque</div>
      <div class="nav-item" onclick="setSection(this,'Favoris','favorites')">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 12.5L3.5 15l.95-5.3L.9 5.9l5.3-.77L8 .5l1.8 4.63 5.3.77-3.55 3.8.95 5.3z"/></svg>
        Favoris
        <span class="nav-badge" id="fav-badge">0</span>
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="main">
    <div class="main-header">
      <div>
        <div class="main-title" id="section-title">En ce moment</div>
        <div class="main-count" id="station-count"></div>
      </div>
      <div class="search-wrap">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="7" cy="7" r="5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg>
        <input type="text" id="search-input" placeholder="Rechercher..." oninput="filterStations(this.value)">
      </div>
    </div>
    <div class="main-content">
      <div class="loading-state" id="loading" style="display:none"><div class="spinner"></div><span>Chargement...</span></div>
      <div class="empty-state" id="empty"><div class="empty-icon">📡</div><div class="empty-head">Aucune station</div><div class="empty-sub">Sélectionne une section</div></div>
      <div class="station-grid" id="grid" style="display:none"></div>
    </div>
    <div class="status-bar" id="status">Prêt.</div>
  </main>

  <!-- PLAYER -->
  <aside class="player">
    <div class="artwork">
      <div class="artwork-blur" id="artwork-blur"></div>
      <div class="artwork-vignette"></div>
      <div class="artwork-idle" id="artwork-idle">
        <svg width="54" height="54" viewBox="0 0 38 38">
          <rect width="38" height="38" rx="9" fill="#1c2026"/>
          <circle cx="19" cy="21" r="14"  fill="none" stroke="#c8d0d8" stroke-width="0.9" opacity="0.18"/>
          <circle cx="19" cy="21" r="9"   fill="none" stroke="#c8d0d8" stroke-width="1"   opacity="0.32"/>
          <circle cx="19" cy="21" r="4.5" fill="none" stroke="#c8d0d8" stroke-width="1.2" opacity="0.5"/>
          <line x1="19" y1="21" x2="30" y2="9" stroke="#e11d2e" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
          <circle cx="29.5" cy="9.5" r="2.2" fill="#e8e8e8" opacity="0.35"/>
          <circle cx="29.5" cy="9.5" r="1"   fill="#e11d2e" opacity="0.45"/>
          <circle cx="19" cy="21" r="2.5" fill="#e11d2e" opacity="0.45"/>
          <circle cx="19" cy="21" r="1"   fill="#1c2026"/>
        </svg>
        <span>aucune station</span>
      </div>
      <div class="artwork-real" id="artwork-real">
        <img id="artwork-img" src="" alt="" onload="onArtworkLoaded()" onerror="onArtworkError()">
      </div>
      <div class="artwork-gen" id="artwork-gen">
        <div class="artwork-gen-deco">
          <svg width="106" height="106" viewBox="0 0 106 106" fill="none">
            <circle cx="53" cy="62" r="44" stroke="white" stroke-width="1" opacity="0.1"/>
            <circle cx="53" cy="62" r="30" stroke="white" stroke-width="1" opacity="0.16"/>
            <circle cx="53" cy="62" r="17" stroke="white" stroke-width="1" opacity="0.22"/>
            <line x1="53" y1="62" x2="82" y2="33" stroke="white" stroke-width="1.5" opacity="0.22" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="artwork-gen-initials" id="artwork-gen-initials"></div>
      </div>
    </div>

    <div class="player-info">
      <div class="player-name idle" id="player-name">Aucune station sélectionnée</div>
      <div class="player-badges" id="player-badges"></div>
      <div class="player-description" id="player-description" style="display:none"></div>
      <div class="player-tags" id="player-tags" style="display:none"></div>
      <button class="player-homepage" id="player-homepage" onclick="openHomepage()">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 2c-2 2-2 10 0 12M8 2c2 2 2 10 0 12M2 8h12"/></svg>
        <span id="player-homepage-text"></span>
      </button>

      <!-- Artiste + titre séparés -->
      <div class="player-now-playing" id="player-now-playing">
        <div class="player-artist" id="player-artist"></div>
        <div class="player-track" id="player-track"></div>
      </div>
      <!-- Fallback sans séparation -->
      <div class="player-track-only" id="player-track-only"></div>

      <div class="bars" id="bars">
        <div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl sm" id="btn-fav" title="Favori" onclick="toggleFav()">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M8 12.5L3.5 15l.95-5.3L.9 5.9l5.3-.77L8 .5l1.8 4.63 5.3.77-3.55 3.8.95 5.3z"/>
        </svg>
      </button>
      <button class="ctrl lg" id="btn-play" onclick="togglePlay()">
        <svg id="icon-play" width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M5 3.5l8 4.5-8 4.5V3.5z"/></svg>
        <svg id="icon-stop" width="18" height="18" viewBox="0 0 16 16" fill="currentColor" style="display:none"><rect x="4" y="4" width="8" height="8" rx="1"/></svg>
      </button>
    </div>

    <div class="vol-row">
      <svg class="vol-icon" width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M3.5 6H1.5v4H3.5L7 13V3L3.5 6zm7-.4c-.6-.6-1-.6-1-.6V7s.4 0 .9.5A3 3 0 0 1 12 10a3 3 0 0 1-1.6 2.5c-.5.4-.9.5-.9.5v1s.4 0 1-.6C11.8 12.6 13 11.4 13 10s-1.2-2.6-2.5-4.4z"/></svg>
      <input type="range" class="vol-slider" id="vol" min="0" max="100" value="100" style="--v:100%" oninput="setVol(this.value)">
      <span class="vol-pct" id="vol-pct">100%</span>
    </div>

    <div class="divider"></div>

    <div class="recent-panel" id="recent-panel">
      <div class="recent-label">Derniers titres</div>
      <div id="recent-list"></div>
    </div>
  </aside>

</div>
<script>
let curStation = null, playing = false;
let favorites = {}, recentTracks = [], allStations = [], filtered = [];
let curHomepage = '';

const PALETTES = [
  ['#1a1060','#4b0082'],['#0a2a1a','#0d5c2e'],['#2a0a0a','#7c1515'],
  ['#0a1a2a','#0d3d6b'],['#1a0a2a','#5c0d7c'],['#2a1a00','#7c4800'],
  ['#001a1a','#0d5555'],['#1a0a1a','#6b0d5c'],['#001a2a','#0d4060'],
  ['#1a1a00','#4a4a00'],['#2a0a10','#800030'],['#001020','#004060'],
];
function nameHash(s){ let h=0; for(let i=0;i<s.length;i++) h=(Math.imul(31,h)+s.charCodeAt(i))|0; return Math.abs(h); }
function getPalette(n){ return PALETTES[nameHash(n||'')%PALETTES.length]; }
function initials(n){ return (n||'?').split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase(); }

function parseTrack(meta) {
  if (!meta) return { artist: '', title: '' };
  const idx = meta.indexOf(' - ');
  if (idx > 0 && idx < meta.length - 3) {
    return { artist: meta.substring(0, idx).trim(), title: meta.substring(idx + 3).trim() };
  }
  return { artist: '', title: meta.trim() };
}

const bridge = {
  send(msg){
    try{ window.webkit.messageHandlers.bbsradioo.postMessage(JSON.stringify(msg)); }
    catch(e){ console.log('[bridge]',JSON.stringify(msg)); }
  }
};

window.onStationsLoaded  = (s) => showStations(s);
window.onStatusChange    = (t) => { document.getElementById('status').textContent=t; };
window.onMetadata        = (t) => setTrack(t);
window.onStationChange   = (s) => {
  if(s){ playing=true; renderPlayer(s); highlightCard(s.id); }
  else { playing=false; setPlayIcon(false); document.getElementById('bars').classList.remove('on'); }
};
window.onFavoritesLoaded = (favs) => {
  favorites={};
  favs.forEach(f=>favorites[f.id]=f);
  document.getElementById('fav-badge').textContent=favs.length||'0';
  updateFavIcon();
};

function setSection(el, title, key){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('section-title').textContent=title;
  document.getElementById('search-input').value='';
  if(key==='favorites'){ showStations(Object.values(favorites)); return; }
  showLoading();
  bridge.send({action:'load_section', section:key});
}

function showLoading(){
  document.getElementById('loading').style.display='flex';
  document.getElementById('empty').style.display='none';
  document.getElementById('grid').style.display='none';
  document.getElementById('station-count').textContent='';
}

function showStations(list){
  allStations=list; filtered=list;
  document.getElementById('loading').style.display='none';
  if(!list.length){
    document.getElementById('empty').style.display='flex';
    document.getElementById('grid').style.display='none';
    document.getElementById('station-count').textContent='';
    return;
  }
  document.getElementById('empty').style.display='none';
  document.getElementById('grid').style.display='grid';
  renderGrid(list);
}

function renderGrid(list){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  document.getElementById('station-count').textContent=`${list.length} station${list.length>1?'s':''}`;
  list.forEach(st=>{
    const init=initials(st.name);
    const isNow=curStation&&curStation.id===st.id&&playing;
    const[c1,c2]=getPalette(st.name);
    const logoHTML=st.favicon
      ?`<img src="${st.favicon}" alt="${init}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="logo-gen" style="display:none;background:linear-gradient(135deg,${c1},${c2})">${init}</div>`
      :`<div class="logo-gen" style="background:linear-gradient(135deg,${c1},${c2})">${init}</div>`;
    const card=document.createElement('div');
    card.className='station-card'+(isNow?' playing':'');
    card.dataset.id=st.id;
    card.innerHTML=`
      <div class="station-logo">${logoHTML}</div>
      <div class="station-info">
        <div class="station-name">${st.name||''}</div>
        <div class="station-desc">${st.description||''}</div>
        <span class="station-country">${st.country||''}</span>
      </div>
      <button class="play-btn" title="${isNow?'Stop':'Écouter'}">
        ${isNow
          ?'<svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><rect width="10" height="10" rx="1"/></svg>'
          :'<svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><path d="M2 1.5l7 3.5-7 3.5z"/></svg>'}
      </button>`;
    card.querySelector('.play-btn').addEventListener('click',e=>{e.stopPropagation();doPlay(st);});
    card.addEventListener('click',()=>doPlay(st));
    grid.appendChild(card);
  });
}

function filterStations(q){
  q=q.toLowerCase();
  filtered=q?allStations.filter(s=>(s.name||'').toLowerCase().includes(q)||(s.description||'').toLowerCase().includes(q)||(s.country||'').toLowerCase().includes(q)):allStations;
  if(document.getElementById('grid').style.display!=='none') renderGrid(filtered);
}

function doPlay(st){
  if(curStation&&curStation.id===st.id&&playing){doStop();return;}
  curStation=st; playing=true;
  bridge.send({action:'play',station:st});
  renderPlayer(st);
  highlightCard(st.id);
  document.getElementById('status').textContent=`Connexion à ${st.name}...`;
}

function doStop(){
  bridge.send({action:'stop'});
  playing=false; setPlayIcon(false);
  document.getElementById('bars').classList.remove('on');
  clearTrack();
  document.getElementById('status').textContent='Arrêté.';
  highlightCard(null);
}

function togglePlay(){
  if(!curStation) return;
  if(playing) doStop();
  else{ bridge.send({action:'play',station:curStation}); playing=true; setPlayIcon(true); document.getElementById('bars').classList.add('on'); }
}

function toggleFav(){
  if(!curStation) return;
  bridge.send({action:'toggle_favorite',station:curStation});
  const id=curStation.id;
  if(favorites[id]) delete favorites[id]; else favorites[id]=curStation;
  document.getElementById('fav-badge').textContent=Object.keys(favorites).length||'0';
  updateFavIcon();
}

function setVol(v){
  v=parseInt(v);
  document.getElementById('vol-pct').textContent=v+'%';
  document.getElementById('vol').style.setProperty('--v',v+'%');
  bridge.send({action:'set_volume',volume:v});
}

function openHomepage(){
  if(curHomepage) window.open(curHomepage,'_blank');
}

function renderPlayer(st){
  const nameEl=document.getElementById('player-name');
  nameEl.textContent=st.name||''; nameEl.classList.remove('idle');

  // Badges
  const badgesEl=document.getElementById('player-badges');
  badgesEl.innerHTML='';
  if(st.bitrate&&st.bitrate>0) badgesEl.innerHTML+=`<span class="badge badge-bitrate">${st.bitrate} kbps</span>`;
  if(st.codec) badgesEl.innerHTML+=`<span class="badge badge-codec">${st.codec.toUpperCase()}</span>`;
  if(st.country) badgesEl.innerHTML+=`<span class="badge badge-country">${st.country}</span>`;
  if(st.source==='somafm'||st.source==='curated')
    badgesEl.innerHTML+=`<span class="badge badge-adfree">✓ sans pub</span>`;
  else if(st.source==='radiobrowser')
    badgesEl.innerHTML+=`<span class="badge badge-source">RadioBrowser</span>`;

  // Description
  const descEl=document.getElementById('player-description');
  const rawDesc=st.description||'';
  // Si la description est une liste de tags, on la met en tags plutôt
  const isTagList = rawDesc.includes(',') && rawDesc.split(',').length > 2;
  if(rawDesc && !isTagList){
    descEl.textContent=rawDesc;
    descEl.style.display='block';
  } else {
    descEl.style.display='none';
  }

  // Tags
  const tagsEl=document.getElementById('player-tags');
  const tags=Array.isArray(st.tags)&&st.tags.length ? st.tags.slice(0,8) :
    (rawDesc&&isTagList ? rawDesc.split(',').map(t=>t.trim()).filter(Boolean).slice(0,8) : []);
  if(tags.length){
    tagsEl.innerHTML=tags.map(t=>`<span class="player-tag">${t}</span>`).join('');
    tagsEl.style.display='flex';
  } else {
    tagsEl.style.display='none';
  }

  // Homepage
  curHomepage=st.homepage||'';
  const homepageEl=document.getElementById('player-homepage');
  if(curHomepage){
    homepageEl.style.display='inline-flex';
    try{
      const url=new URL(curHomepage);
      document.getElementById('player-homepage-text').textContent=url.hostname.replace('www.','');
    }catch{
      document.getElementById('player-homepage-text').textContent=curHomepage.substring(0,30);
    }
  } else {
    homepageEl.style.display='none';
  }

  setPlayIcon(true);
  document.getElementById('bars').classList.add('on');
  clearTrack();

  // Artwork
  const idle=document.getElementById('artwork-idle');
  const real=document.getElementById('artwork-real');
  const gen=document.getElementById('artwork-gen');
  const blur=document.getElementById('artwork-blur');
  const img=document.getElementById('artwork-img');
  idle.style.display='none';
  if(st.favicon){
    real.style.display='flex'; gen.style.display='none';
    img.src=st.favicon;
    blur.style.backgroundImage=`url(${st.favicon})`; blur.style.background='';
    blur.classList.add('on');
  } else {
    _showGenerated(st);
  }
  updateFavIcon();
}

function _showGenerated(st){
  const real=document.getElementById('artwork-real');
  const gen=document.getElementById('artwork-gen');
  const blur=document.getElementById('artwork-blur');
  real.style.display='none'; gen.style.display='flex';
  const[c1,c2]=getPalette(st.name||'');
  gen.style.background=`linear-gradient(145deg,${c1},${c2})`;
  document.getElementById('artwork-gen-initials').textContent=initials(st.name);
  blur.style.backgroundImage=''; blur.style.background=`linear-gradient(145deg,${c1},${c2})`;
  blur.classList.add('on');
}

function onArtworkLoaded(){}
function onArtworkError(){ if(curStation) _showGenerated(curStation); }

function clearTrack(){
  document.getElementById('player-now-playing').classList.remove('visible');
  document.getElementById('player-artist').textContent='';
  document.getElementById('player-track').textContent='';
  document.getElementById('player-track-only').style.display='none';
  document.getElementById('player-track-only').textContent='';
}

function setTrack(meta){
  if(!meta){ clearTrack(); return; }

  const { artist, title } = parseTrack(meta);
  const nowPlaying = document.getElementById('player-now-playing');
  const trackOnly = document.getElementById('player-track-only');

  if(artist && title){
    document.getElementById('player-artist').textContent=artist;
    document.getElementById('player-track').textContent=title;
    nowPlaying.classList.add('visible');
    trackOnly.style.display='none';
  } else {
    nowPlaying.classList.remove('visible');
    trackOnly.textContent=meta;
    trackOnly.style.display='block';
  }

  document.getElementById('bars').classList.add('on');
  addRecent(artist, title || meta);
}

function setPlayIcon(on){
  document.getElementById('icon-play').style.display=on?'none':'block';
  document.getElementById('icon-stop').style.display=on?'block':'none';
}

function updateFavIcon(){
  const btn=document.getElementById('btn-fav');
  const on=curStation&&!!favorites[curStation.id];
  btn.classList.toggle('gold',on);
  btn.innerHTML=on
    ?'<svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><path d="M8 12.5L3.5 15l.95-5.3L.9 5.9l5.3-.77L8 .5l1.8 4.63 5.3.77-3.55 3.8.95 5.3z"/></svg>'
    :'<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 12.5L3.5 15l.95-5.3L.9 5.9l5.3-.77L8 .5l1.8 4.63 5.3.77-3.55 3.8.95 5.3z"/></svg>';
}

function highlightCard(id){
  document.querySelectorAll('.station-card').forEach(c=>{
    const a=c.dataset.id===id;
    c.classList.toggle('playing',a);
    const btn=c.querySelector('.play-btn');
    if(btn) btn.innerHTML=a
      ?'<svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><rect width="10" height="10" rx="1"/></svg>'
      :'<svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><path d="M2 1.5l7 3.5-7 3.5z"/></svg>';
  });
}

function addRecent(artist, title){
  const t=new Date().toLocaleTimeString('fr',{hour:'2-digit',minute:'2-digit'});
  const full=artist?`${artist} — ${title}`:title;
  recentTracks=[{artist,title,time:t},...recentTracks.filter(r=>r.title!==title)].slice(0,8);
  document.getElementById('recent-panel').style.display='block';
  document.getElementById('recent-list').innerHTML=recentTracks.map((r,i)=>`
    <div class="track-item">
      <span class="track-num">${i+1}</span>
      <div class="track-info">
        ${r.artist?`<div class="track-artist">${r.artist}</div>`:''}
        <div class="track-title">${r.title}</div>
      </div>
      <span class="track-time">${r.time}</span>
    </div>`).join('');
}

document.addEventListener('DOMContentLoaded',()=>{ showLoading(); });
</script>
</body>
</html>
